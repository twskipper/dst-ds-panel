version: "3.8"

services:
  dst-ds-panel:
    image: dst-ds-panel:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile.panel
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - panel-data:/app/data
      - ./config.json:/app/config.json:ro
    restart: unless-stopped
    environment:
      - PORT=8080

volumes:
  panel-data:
