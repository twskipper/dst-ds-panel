services:
  panel:
    image: twskipper/dst-ds-panel:latest
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - panel-data:/app/data
      - ./config.json:/app/config.json:ro
    restart: unless-stopped
    environment:
      - PORT=8080
      - DST_IMAGE=twskipper/dst-ds-runtime:linux

volumes:
  panel-data:
